<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIPER-CORE v1.0</title>
    <style>
        :root { --bg: #000; --accent: #0f0; --panel: #0a0a0a; --border: #1a1a1a; --user-msg: #161616; --danger: #f00; --text: #d1d1d1; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #sidebar { width: 280px; background: var(--panel); position: fixed; left: -280px; height: 100%; transition: 0.3s; z-index: 2000; border-right: 1px solid var(--border); padding: 20px; box-sizing: border-box; }
        #sidebar.open { left: 0; }
        .close-x { position: absolute; top: 10px; right: 10px; color: var(--danger); font-weight: bold; cursor: pointer; border: 1px solid var(--danger); padding: 5px 10px; border-radius: 3px; font-size: 12px; }
        .nav-btn { width: 100%; background: transparent; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 4px; margin-bottom: 15px; cursor: pointer; font-size: 13px; font-weight: bold; text-transform: uppercase; text-align: left; }
        
        .chat-item { padding: 12px; border-radius: 4px; margin-bottom: 8px; background: #0f0f0f; font-size: 13px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 1px solid transparent; }
        .chat-item.pinned { border-color: var(--accent); background: #051005; }
        .pin-text { color: #555; font-size: 10px; margin-left: 10px; font-weight: bold; }

        header { height: 60px; min-height: 60px; padding: 0 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: #000; z-index: 10; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 150px; scroll-behavior: smooth; }
        .welcome-msg { text-align: center; margin: auto; color: #444; }
        .welcome-msg h2 { color: #fff; font-weight: 200; font-size: 2.5rem; margin-bottom: 10px; letter-spacing: -1px; }

        .msg { max-width: 80%; padding: 14px 18px; border-radius: 18px; font-size: 15px; line-height: 1.5; position: relative; animation: fadeIn 0.2s; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--user-msg); color: #fff; border-bottom-right-radius: 2px; }
        .viper { align-self: flex-start; background: #0a0a0a; border: 1px solid var(--border); color: var(--accent); border-bottom-left-radius: 2px; }
        
        #input-container { position: fixed; bottom: 0; width: 100%; padding: 15px 15px 35px 15px; box-sizing: border-box; background: linear-gradient(transparent, #000 70%); z-index: 1500; }
        #input-area { background: #141414; border-radius: 30px; display: flex; align-items: center; padding: 5px 20px; border: 1px solid #2a2a2a; gap: 10px; }
        #user-input { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 15px 0; outline: none; font-size: 16px; }
        
        .action-btn { background: none; border: none; color: #555; font-size: 22px; cursor: pointer; padding: 5px; }

        #popup-menu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; }
        .menu-content { background: #080808; width: 280px; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .menu-opt { padding: 18px; border-bottom: 1px solid #1a1a1a; text-align: center; cursor: pointer; font-size: 14px; font-weight: bold; text-transform: uppercase; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="close-x" onclick="toggleMenu()">X</div>
        <div style="font-size: 10px; color: var(--accent); margin-bottom: 25px; letter-spacing: 2px;">VIPER-CORE v1.0</div>
        <button class="nav-btn" onclick="newChat()">+ NUEVA SESION</button>
        <button class="nav-btn" onclick="toggleMemoria()">MEMORIA: <span id="mem-stat">ON</span></button>
        <div id="chat-list" style="margin-top: 20px;"></div>
    </div>

    <div id="popup-menu">
        <div class="menu-content" id="menu-box"></div>
    </div>

    <header>
        <div onclick="toggleMenu()" style="font-size:32px; cursor:pointer; color:var(--accent);">M</div>
        <div id="header-title" onclick="renameChat()" style="font-weight:bold; letter-spacing:3px; font-size: 14px; cursor:pointer;">VIPER-CORE</div>
        <div style="width:10px; height:10px; background:var(--accent); border-radius:50%;"></div>
    </header>

    <div id="chat-box">
        <div class="welcome-msg" id="welcome">
            <h2>HOLA</h2>
            <p style="font-size: 11px; letter-spacing: 1px;">SISTEMA CARGADO | V1.0</p>
        </div>
    </div>

    <div id="input-container">
        <div id="input-area">
            <button class="action-btn" onclick="historyNav(-1)">&lt;</button>
            <input type="text" id="user-input" placeholder="Escribir..." autocomplete="off">
            <button class="action-btn" onclick="historyNav(1)">&gt;</button>
            <button class="action-btn" onclick="sendMessage()" style="color:var(--accent)">V</button>
        </div>
    </div>

    <script>
        let currentSession = { id: Date.now(), title: "LOG_01", messages: [], pinned: false };
        let historyIndex = -1;
        let memoriaActiva = true;
        let pressTimer;

        const RESPUESTAS_MAGICAS = {
            "hola": [
                "Hola, Operador como va todo?.",
                "Holis, dime en qué puedo ayudarte hoy.",
                "Hola, por fin alguien con modales.",
                "Hola, en qué puedo ayudarle."
            ],
            "status": [
                "Sistemas en verde.",
                "Bunker asegurado.",
                "Protocolos operativos."
            ]
        };

        function motorGeneral() {
            const r = Math.random();
            if (r < 0.2) return "Analizando datos... Sin cambios.";
            if (r < 0.4) return "Conexion estable.";
            if (r < 0.6) return "Respuesta estandar ejecutada.";
            if (r < 0.8) return "Logica procesada correctamente.";
            return "VIPER listo.";
        }

        function sendMessage() {
            const input = document.getElementById("user-input");
            const val = input.value.trim();
            if(!val) return;

            document.getElementById("welcome").style.display = "none";
            currentSession.messages.push({ id: Date.now(), role: 'u', text: val });
            if(currentSession.messages.length === 1) currentSession.title = val.substring(0, 15).toUpperCase();
            
            renderChat();
            input.value = "";

            setTimeout(() => {
                let respuesta;
                const clave = val.toLowerCase();
                if (RESPUESTAS_MAGICAS[clave]) {
                    const ops = RESPUESTAS_MAGICAS[clave];
                    respuesta = ops[Math.floor(Math.random() * ops.length)];
                } else {
                    respuesta = motorGeneral();
                }
                currentSession.messages.push({ id: Date.now() + 1, role: 'v', text: respuesta });
                renderChat();
                save();
            }, 250);
        }

        function renderChat() {
            const box = document.getElementById("chat-box");
            box.innerHTML = "";
            currentSession.messages.forEach((m, idx) => {
                const div = document.createElement("div");
                div.className = `msg ${m.role === 'u' ? 'user' : 'viper'}`;
                div.innerHTML = m.text;
                div.onmousedown = div.ontouchstart = () => pressTimer = setTimeout(() => openMenu(idx), 800);
                div.onmouseup = div.ontouchend = () => clearTimeout(pressTimer);
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
            document.getElementById("header-title").innerText = currentSession.title;
        }

        function openMenu(idx) {
            const menu = document.getElementById("menu-box");
            menu.innerHTML = `
                <div class="close-x" style="margin:10px;" onclick="closeMenu()">X</div>
                <div class="menu-opt" onclick="editMsg(${idx})">EDITAR</div>
                <div class="menu-opt" onclick="deleteMsg(${idx})" style="color:var(--danger)">BORRAR</div>
                <div class="menu-opt" onclick="togglePinChat()"> ${currentSession.pinned ? 'DESANCLAR' : 'ANCLAR'}</div>
            `;
            document.getElementById("popup-menu").style.display = "flex";
        }

        function closeMenu() { document.getElementById("popup-menu").style.display = "none"; }
        function editMsg(idx) {
            const nt = prompt("Corregir:", currentSession.messages[idx].text);
            if(nt) { currentSession.messages[idx].text = nt; renderChat(); save(); }
            closeMenu();
        }
        function deleteMsg(idx) { currentSession.messages.splice(idx, 1); renderChat(); save(); closeMenu(); }
        function toggleMemoria() { memoriaActiva = !memoriaActiva; document.getElementById("mem-stat").innerText = memoriaActiva ? "ON" : "OFF"; }
        function togglePinChat() { currentSession.pinned = !currentSession.pinned; save(); updateSidebar(); closeMenu(); }

        function save() {
            let logs = JSON.parse(localStorage.getItem('viper_v1') || "[]");
            const i = logs.findIndex(l => l.id === currentSession.id);
            if(i > -1) logs[i] = currentSession; else logs.unshift(currentSession);
            logs.sort((a,b) => (b.pinned - a.pinned) || (b.id - a.id));
            localStorage.setItem('viper_v1', JSON.stringify(logs));
            updateSidebar();
        }

        function updateSidebar() {
            const list = document.getElementById("chat-list");
            list.innerHTML = "";
            const logs = JSON.parse(localStorage.getItem('viper_v1') || "[]");
            logs.forEach(l => {
                const d = document.createElement("div");
                d.className = `chat-item ${l.pinned ? 'pinned' : ''}`;
                d.innerHTML = `<span>${l.title}</span> <span class="pin-text">${l.pinned ? '[FIJADO]' : ''}</span>`;
                d.onclick = () => { currentSession = l; renderChat(); toggleMenu(); document.getElementById("welcome").style.display="none"; };
                list.appendChild(d);
            });
        }

        function historyNav(dir) {
            const uMsgs = currentSession.messages.filter(m => m.role === 'u');
            historyIndex += dir;
            if(historyIndex < 0) historyIndex = 0; if(historyIndex >= uMsgs.length) historyIndex = uMsgs.length;
            document.getElementById("user-input").value = uMsgs[historyIndex] ? uMsgs[historyIndex].text : "";
        }

        function newChat() {
            currentSession = { id: Date.now(), title: "NUEVO_LOG", messages: [], pinned: false };
            document.getElementById("welcome").style.display = "block";
            renderChat(); toggleMenu();
        }

        function toggleMenu() { document.getElementById("sidebar").classList.toggle("open"); }
        function renameChat() { const n = prompt("ID:", currentSession.title); if(n) { currentSession.title = n.toUpperCase(); save(); renderChat(); } }
        document.getElementById("user-input").onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        window.onload = updateSidebar;
    </script>
</body>
</html>
