<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Viper</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* MENÚ LATERAL */
        #menu-lateral { background-color: #111; width: 280px; position: fixed; top: 0; left: -280px; height: 100%; transition: 0.3s; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; z-index: 1000; border-right: 1px solid #333; }
        #menu-lateral.abierto { left: 0; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 999; }
        #overlay.abierto { display: block; }

        .titulo-seccion { color: #888; font-size: 12px; text-transform: uppercase; margin: 15px 0 10px 0; font-weight: bold; }
        .link-menu { display: block; color: #fff; text-decoration: none; padding: 12px; border-radius: 8px; font-size: 15px; }
        .link-menu:active { background-color: #333; }

        /* BARRA SUPERIOR */
        #barra-superior { height: 60px; background: #000; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #333; position: fixed; top: 0; width: 100%; box-sizing: border-box; z-index: 998; }
        #boton-menu { color: #fff; font-size: 24px; background: none; border: none; cursor: pointer; margin-right: 20px; }
        #titulo-header { font-size: 18px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-grow: 1; }

        /* CHAT */
        #contenedor-chat { flex-grow: 1; display: flex; flex-direction: column; margin-top: 60px; height: calc(100vh - 60px); width: 100%; }
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .user-msg { align-self: flex-end; background: #333; padding: 10px 15px; border-radius: 15px 15px 0 15px; max-width: 80%; }
        .bot-msg { align-self: flex-start; background: #1a1a1a; padding: 10px 15px; border-radius: 15px 15px 15px 0; max-width: 80%; border: 1px solid #333; font-size: 15px; line-height: 1.4; }

        /* ENTRADA AJUSTADA PARA COMODIDAD */
        #zona-entrada { background: #000; padding: 15px 15px 25px 15px; display: flex; align-items: center; border-top: 1px solid #333; }
        #user-input { flex-grow: 1; background: #222; border: none; color: #fff; padding: 12px 18px; border-radius: 25px; outline: none; font-size: 16px; }
        #boton-enviar { background: #fff; color: #000; border: none; padding: 10px 15px; border-radius: 50%; font-size: 18px; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleMenu()"></div>

    <div id="menu-lateral">
        <a href="index.html" class="link-menu" style="border-bottom: 1px solid #333; margin-bottom: 10px;">◀ Volver al Búnker</a>
        <div class="titulo-seccion">Recientes</div>
        <a href="ia.html" class="link-menu">Nueva sesión</a>
        <div class="titulo-seccion">Búnker ZK</div>
        <a href="cine.html" class="link-menu">Cine 1</a>
        <a href="cine2.html" class="link-menu">Cine 2</a>
        <a href="cine3.html" class="link-menu">Cine 3</a>
        <a href="cine4.html" class="link-menu">Cine 4</a>
        <a href="cine5.html" class="link-menu">Cine 5</a>
        <a href="hekappo.html" class="link-menu">Hekapoo - Cómic</a>
    </div>

    <div id="barra-superior">
        <button id="boton-menu" onclick="toggleMenu()">&#9776;</button>
        <div id="titulo-header">Terminal ZK</div>
    </div>

    <div id="contenedor-chat">
        <div id="chat-box">
            <div id="msj-guia" style="color: #666; text-align: center; margin-top: 20px; font-size: 14px;">Inicia una conversación con el núcleo ZK</div>
        </div>
        <div id="zona-entrada">
            <input type="text" id="user-input" placeholder="Escribir mensaje..." autocomplete="off">
            <button id="boton-enviar" onclick="enviarMensaje()">&#10148;</button>
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById("menu-lateral").classList.toggle("abierto");
            document.getElementById("overlay").classList.toggle("abierto");
        }

        // --- EL DICCIONARIO DE RESPUESTAS ---
        // Aquí puedes agregar todas las que quieras siguiendo el formato "palabra": "respuesta",
        const baseDatos = {
            "hola": "hola. como esta su dia.",
            "Hola": "hola, como estás.",
            "hola": "holaaa, que tal tu día.",
            "quien eres": "Mi nombre es Viper, y si me lo permite su asistente.",
            "estás bien": "La verdad desconozco mis sentimientos, pero diria que siento mas o menos.",
            "gracias": "No ay de que, si nesesitas algo recuerda qud estoy para ayudarte.",
            "bueno tengo que irme": "Exelente, has lo que tengas que hacer y si tienes duda de algo, aqui estoy yo jaja.",
            "adios": "Chao.",
            "Sexo?": "perdón?, comporte se.",
            "SEXO": "Le pido por favor que se comporté.",
            "Podríamos tener sexo?": "Que le pesa?, Sexo? póngase a estudiar mejor.",
            "Tengo depresión": "Que le paso?, se encuentra un poco estable o se siente muy ma.",
            "mal": "como le ayudaría para que se sienta mejor?.",
            "estatus": "sitio web: Seguro. Archivos: Encriptados. Conexión: Activa.",
            "que sabes": "Tengo acceso a los registros del búnker, pero mi base de datos sobre usuarios externos está vacía.",
            "jajaja": "jaja."
            "Bien": "es bueno saber que estes bien.",
        };

        function enviarMensaje() {
            let input = document.getElementById("user-input");
            let chatBox = document.getElementById("chat-box");
            let header = document.getElementById("titulo-header");
            let texto = input.value.trim();
            let msgMin = texto.toLowerCase();

            if (texto === "") return;

            // Quitar mensaje de guía si existe
            if(document.getElementById("msj-guia")) document.getElementById("msj-guia").remove();

            // Título dinámico
            let palabras = texto.split(' ');
            header.innerText = palabras.slice(0, 3).join(' ') + (palabras.length > 3 ? "..." : "");

            // Poner tu mensaje
            chatBox.innerHTML += `<div class="user-msg">${texto}</div>`;
            
            // --- BUSCADOR DE RESPUESTA ---
            let respuestaIA = "Comando no identificado. Procesando solicitud de registro.";

            for (let clave in baseDatos) {
                if (msgMin.includes(clave)) {
                    respuestaIA = baseDatos[clave];
                    break;
                }
            }

            // Respuesta automática con delay
            setTimeout(() => {
                chatBox.innerHTML += `<div class="bot-msg">${respuestaIA}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 450);

            input.value = "";
        }

        document.getElementById("user-input").onkeypress = function(e) {
            if (e.key === 'Enter') enviarMensaje();
        };
    </script>
</body>
</html>
