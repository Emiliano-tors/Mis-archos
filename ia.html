<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIPER-CORE Terminal</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #barra { height: 60px; border-bottom: 1px solid #333; display: flex; align-items: center; padding: 0 15px; font-weight: bold; }
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .user-msg { align-self: flex-end; background: #333; padding: 10px; border-radius: 10px; }
        .bot-msg { align-self: flex-start; background: #1a1a1a; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        #entrada { padding: 20px; border-top: 1px solid #333; display: flex; }
        #user-input { flex-grow: 1; background: #222; border: none; color: #fff; padding: 10px; border-radius: 20px; outline: none; }
        #btn { background: #fff; border: none; padding: 10px; margin-left: 10px; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="barra">VIPER-CORE v1.0</div>
    <div id="chat-box"></div>
    <div id="entrada">
        <input type="text" id="user-input" placeholder="Comando...">
        <button id="btn" onclick="enviar()">></button>
    </div>

    <script>
        const baseDatos = {
            "hola": ["VIPER-CORE: En línea. Saludos, E2012.", "Sistemas listos."],
            "quien eres": ["Soy VIPER-CORE, creada por E2012 y GM-CORE."],
            "777": ["ACCESO CONCEDIDO: <br><img src='secreto.jpg' style='width:100%; border-radius:5px;'>"],
            "tabla del 2": ["2x1=2, 2x2=4, 2x3=6, 2x4=8, 2x5=10, 2x6=12, 2x7=14, 2x8=16, 2x9=18, 2x10=20."]
        };

        function enviar() {
            let input = document.getElementById("user-input");
            let val = input.value.trim().toLowerCase();
            if (!val) return;

            let box = document.getElementById("chat-box");
            box.innerHTML += `<div class="user-msg">${input.value}</div>`;

            let res = "VIPER: Comando no reconocido.";
            if (baseDatos[val]) {
                let opciones = baseDatos[val];
                res = opciones[Math.floor(Math.random() * opciones.length)];
            }

            setTimeout(() => {
                box.innerHTML += `<div class="bot-msg">${res}</div>`;
                box.scrollTop = box.scrollHeight;
            }, 400);
            input.value = "";
        }
    </script>
</body>
</html>
