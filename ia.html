<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIPER-CORE v3.5</title>
    <style>
        :root { --bg: #050505; --panel: #111; --accent: #0f0; --text: #eee; --border: #222; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        #sidebar { width: 260px; background: var(--panel); position: fixed; left: -260px; height: 100%; transition: 0.3s; z-index: 1000; border-right: 1px solid var(--border); padding: 15px; box-sizing: border-box; }
        #sidebar.open { left: 0; }
        .nav-btn { width: 100%; background: #222; border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 4px; margin-bottom: 20px; cursor: pointer; text-transform: uppercase; font-size: 12px; }

        /* INTERFAZ PRINCIPAL AJUSTADA */
        #main { flex-grow: 1; display: flex; flex-direction: column; width: 100%; position: relative; }
        #header { height: 45px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; justify-content: space-between; background: #000; }
        
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        
        /* MENSAJES ESTILO MINIMALISTA */
        .msg { max-width: 80%; padding: 8px 12px; border-radius: 4px; font-size: 14px; position: relative; word-wrap: break-word; }
        .user { align-self: flex-end; background: #1a1a1a; border-right: 2px solid var(--accent); color: #fff; }
        .viper { align-self: flex-start; background: #000; border: 1px solid var(--border); border-left: 2px solid var(--accent); }

        /* INTERFAZ DE ESCRITURA (ESTILO CAPTURA) */
        #input-container { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 95%; background: #111; border-radius: 25px; border: 1px solid var(--border); display: flex; align-items: center; padding: 5px 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        #user-input { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 10px; outline: none; font-size: 14px; }
        .action-btn { background: transparent; border: none; color: var(--accent); font-size: 18px; cursor: pointer; padding: 0 8px; }

        /* MENÚ EMERGENTE (POPUP) */
        #popup-menu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; }
        .menu-content { background: #111; border: 1px solid var(--accent); width: 70%; padding: 15px; display: flex; flex-direction: column; gap: 10px; }

        #welcome-msg { text-align: center; margin-top: 50px; color: #555; }
        #welcome-msg h2 { color: #fff; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="sidebar">
        <button class="nav-btn" onclick="newChat()">+ Nueva Sesión</button>
        <div id="fav-list" style="margin-top:20px;">
            <p style="font-size:10px; color:var(--accent)">★ FAVORITOS</p>
            <div id="favorites-container"></div>
        </div>
    </div>

    <div id="popup-menu">
        <div class="menu-content">
            <button class="nav-btn" onclick="actionViper('fav')">FAVORITO</button>
            <button class="nav-btn" onclick="actionViper('del')" style="color:#f44">BORRAR</button>
            <button class="nav-btn" onclick="actionViper('save')">GUARDAR CAMBIOS</button>
            <button class="nav-btn" onclick="closePopup()">CANCELAR</button>
        </div>
    </div>

    <div id="main">
        <div id="header">
            <span onclick="toggleMenu()" style="cursor:pointer">≡</span>
            <span id="header-title">VIPER CORE</span>
            <span onclick="showFavs()" style="color:var(--accent); font-size:12px; cursor:pointer">★</span>
        </div>

        <div id="chat-box">
            <div id="welcome-msg">
                <h2>Hola, Invitado</h2>
                <p>¿Dígame cuál es su pregunta?</p>
            </div>
        </div>

        <div id="input-container">
            <button class="action-btn" onclick="historyBack()">«</button>
            <input type="text" id="user-input" placeholder="Responder" autocomplete="off">
            <button class="action-btn" onclick="historyForward()">»</button>
            <button class="action-btn" onclick="sendMessage()" style="font-weight:bold">⌁</button>
        </div>
    </div>

    <script>
        // --- ESPACIO PARA TUS NUEVAS PALABRAS Y CÓDIGOS ---
        const DiccionarioPersonal = ["guayaba", "bunker", "pro", "épico"]; 
        const MisCodigos = { 
            "guayaba": "Delicioso.", 
            "777": "ACCESO CONCEDIDO. Archivo clasificado activo." 
        };

        const Abecedario = "abcdefghijklmnopqrstuvwxyzáéíóúñ".split("");
        
        // --- MOTOR DE ANÁLISIS ---
        const Respuestas = {
            "hola": ["Hola, invitado. Sistema en línea.", "VIPER listo para procesar."],
            "como estas": ["Me siento perfecta.", "Todo en orden. De eso no se preocupe."],
            "default": ["Procesando datos... frase analizada mediante diccionario."]
        };

        let currentSession = { messages: [] };
        let selectedMsgIndex = -1;
        let favoritos = JSON.parse(localStorage.getItem('v_favs') || "[]");

        function analyze(text) {
            let low = text.toLowerCase();
            if(MisCodigos[low]) return MisCodigos[low];
            
            // Lógica de búsqueda en diccionario
            for(let key in Respuestas) {
                if(low.includes(key)) return Respuestas[key][Math.floor(Math.random()*Respuestas[key].length)];
            }
            return "Comando analizado con el abecedario y diccionario. Resultado: Óptimo.";
        }

        function sendMessage() {
            const input = document.getElementById("user-input");
            if(!input.value.trim()) return;
            
            document.getElementById("welcome-msg").style.display = "none";
            let text = input.value;
            currentSession.messages.push({ role: 'u', text: text });
            
            render();
            
            setTimeout(() => {
                let res = analyze(text);
                currentSession.messages.push({ role: 'v', text: res });
                render();
            }, 500);
            input.value = "";
        }

        function render() {
            const box = document.getElementById("chat-box");
            box.innerHTML = "";
            currentSession.messages.forEach((m, i) => {
                let div = document.createElement("div");
                div.className = `msg ${m.role === 'u' ? 'user' : 'viper'}`;
                div.innerText = m.role === 'v' ? `VIPER: ${m.text}` : m.text;
                
                // Mantener presionado en VIPER
                if(m.role === 'v') {
                    let t;
                    div.onpointerdown = () => t = setTimeout(() => openPopup(i), 800);
                    div.onpointerup = () => clearTimeout(t);
                }
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        }

        // --- ACCIONES DEL POPUP ---
        function openPopup(index) {
            selectedMsgIndex = index;
            document.getElementById("popup-menu").style.display = "flex";
        }

        function closePopup() { document.getElementById("popup-menu").style.display = "none"; }

        function actionViper(type) {
            let msg = currentSession.messages[selectedMsgIndex];
            if(type === 'del') {
                msg.text = "lo lamento mucho si no fui de ayuda";
                msg.deleted = true;
            } else if(type === 'fav') {
                if(!favoritos.includes(msg.text)) favoritos.push(msg.text);
            } else if(type === 'save') {
                localStorage.setItem('v_favs', JSON.stringify(favoritos));
                alert("Cambios guardados en el búnker.");
            }
            closePopup();
            render();
            updateFavList();
        }

        function updateFavList() {
            const cont = document.getElementById("favorites-container");
            cont.innerHTML = favoritos.map(f => `<div class="chat-item" style="font-size:10px; border-bottom:1px solid #222; padding:5px;">${f}</div>`).join("");
        }

        function historyBack() { currentSession.messages.pop(); currentSession.messages.pop(); render(); }
        function toggleMenu() { document.getElementById("sidebar").classList.toggle("open"); }
        function newChat() { location.reload(); }

        document.getElementById("user-input").onkeypress = (e) => e.key === 'Enter' && sendMessage();
        window.onload = updateFavList;
    </script>
</body>
</html>
