<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIPER-CORE v4.2</title>
    <style>
        :root { --bg: #000; --panel: #111; --accent: #0f0; --text: #eee; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        #sidebar { width: 280px; background: var(--panel); position: fixed; left: -280px; height: 100%; transition: 0.3s; z-index: 2000; border-right: 1px solid var(--border); padding: 15px; box-sizing: border-box; }
        #sidebar.open { left: 0; }
        .nav-btn { width: 100%; background: #222; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 15px; cursor: pointer; font-weight: bold; }
        
        .chat-item { padding: 12px; border-radius: 8px; margin-bottom: 5px; background: #1a1a1a; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .chat-item.pinned { border-left: 3px solid var(--accent); background: #1a2a1a; }

        /* INTERFAZ PRINCIPAL */
        #main { flex-grow: 1; display: flex; flex-direction: column; width: 100%; height: 100%; position: relative; }
        #header { height: 60px; min-height: 60px; padding: 0 15px; display: flex; align-items: center; border-bottom: 1px solid var(--border); justify-content: space-between; background: #000; z-index: 10; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 150px; }
        .welcome-msg { text-align: center; margin-top: 40px; color: #888; }
        .welcome-msg h2 { color: #fff; margin-bottom: 5px; font-size: 2rem; }

        .msg { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 15px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .user { align-self: flex-end; background: #333; color: #fff; border-bottom-right-radius: 2px; }
        .viper { align-self: flex-start; background: #111; border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        /* BARRA DE RESPUESTA FIJA Y ELEVADA */
        #input-container { 
            position: fixed; 
            bottom: 0; 
            left: 0;
            width: 100%; 
            padding: 15px 15px 35px 15px; 
            box-sizing: border-box; 
            background: linear-gradient(to top, #000 80%, transparent);
            z-index: 1500;
        }
        #input-area { 
            background: #222; 
            border-radius: 30px; 
            display: flex; 
            align-items: center; 
            padding: 5px 15px; 
            border: 1px solid #444; 
            gap: 10px; 
            box-shadow: 0 -5px 25px rgba(0,0,0,0.8);
        }
        #user-input { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 15px 0; outline: none; font-size: 16px; }
        
        .action-btn { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; padding: 5px; opacity: 0.7; }
        .send-btn { color: var(--accent); opacity: 1; font-size: 28px; }

        /* POPUPS Y OVERLAYS */
        #popup-menu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; }
        .menu-content { background: #1a1a1a; width: 280px; border-radius: 15px; border: 1px solid var(--border); overflow: hidden; }
        .menu-opt { padding: 18px; border-bottom: 1px solid #333; text-align: center; cursor: pointer; font-size: 16px; }
        .menu-opt:active { background: #333; }

        #fav-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        #overlay-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1999; }
    </style>
</head>
<body>

    <div id="overlay-bg" onclick="toggleMenu()"></div>
    
    <div id="fav-screen">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #333; padding-bottom: 10px;">
            <h3 style="color: var(--accent);">⭐ ARCHIVOS GUARDADOS</h3>
            <button onclick="closeFavs()" class="nav-btn" style="width:50px; margin:0; background:#333;">X</button>
        </div>
        <div id="fav-list" style="margin-top:20px;"></div>
    </div>

    <div id="sidebar">
        <h2 style="color:var(--accent); margin-bottom: 20px;">BÚNKER VIPER</h2>
        <button class="nav-btn" onclick="newChat()">+ Nuevo Chat</button>
        <button class="nav-btn" onclick="openFavs()" style="background:#2a2a00; border-color:#550; color:#ff0;">⭐ Ver Favoritos</button>
        <div style="margin: 15px 0 10px 5px; font-size: 12px; color: #666; font-weight: bold;">HISTORIAL RECIENTE</div>
        <div id="chat-list"></div>
    </div>

    <div id="popup-menu">
        <div class="menu-content">
            <div class="menu-opt" onclick="actionFav()" style="color:#ff0">⭐ Marcar como Favorito</div>
            <div class="menu-opt" onclick="actionDelete()" style="color:#f44">🗑️ Eliminar Comando</div>
            <div class="menu-opt" onclick="actionSave()" style="color:#0f0">💾 Encriptar y Guardar</div>
            <div class="menu-opt" onclick="closePopup()" style="background:#222;">Cancelar</div>
        </div>
    </div>

    <div id="main">
        <div id="header">
            <div onclick="toggleMenu()" style="font-size:30px; cursor:pointer; padding: 5px;">≡</div>
            <div id="header-title" style="font-weight:bold; letter-spacing:2px; font-size: 18px;">VIPER</div>
            <div id="status-dot" style="width:12px; height:12px; background:var(--accent); border-radius:50%; box-shadow: 0 0 10px var(--accent);"></div>
        </div>

        <div id="chat-box">
            <div class="welcome-msg" id="welcome">
                <h2>Hola, Invitado</h2>
                <p>Sistema VIPER-CORE listo.<br>¿Qué información solicita el Operador?</p>
            </div>
        </div>

        <div id="input-container">
            <div id="input-area">
                <button class="action-btn" onclick="historyBack()" title="Retroceder">«</button>
                <input type="text" id="user-input" placeholder="Escribir comando..." autocomplete="off">
                <button class="action-btn send-btn" onclick="sendMessage()">⌁</button>
            </div>
        </div>
    </div>

    <script>
        const RespuestasIA = {
            "hola": ["Hola, operador. VIPER activo.", "Conexión establecida.", "Sistemas listos para procesar."],
            "como": ["Procesando datos internos. Me siento en estado óptimo.", "Funcionando al 100% de capacidad."],
            "estas": ["Operando dentro de los parámetros normales.", "Estado: Excelente."],
            "777": ["ACCESO CONCEDIDO. Mostrando archivo clasificado: <br><img src='https://via.placeholder.com/300x150/0f0/000?text=ARCHIVO+777' style='width:100%; border-radius:10px; margin-top:10px;'>"],
            "adios": ["Cerrando sesión. Cuídate, Operador.", "VIPER fuera. Mantente a salvo."],
            "default": ["Comando analizado. No hay registros exactos, pero proceso tu solicitud."]
        };

        const Codigos = { "937": "Acceso total al búnker.", "guayaba": "Delicioso." };

        let currentSession = { id: Date.now(), title: "Chat", messages: [], pinned: false };
        let selectedMsgIndex = -1;
        let favoritos = JSON.parse(localStorage.getItem('v_favs') || "[]");

        function analyzeInput(input) {
            let palabras = input.toLowerCase().split(" ");
            for(let p of palabras) { if(Codigos[p]) return Codigos[p]; }
            for(let p of palabras) {
                if(RespuestasIA[p]) {
                    let r = RespuestasIA[p];
                    return r[Math.floor(Math.random() * r.length)];
                }
            }
            return RespuestasIA["default"][0];
        }

        function sendMessage() {
            const input = document.getElementById("user-input");
            const text = input.value.trim();
            if(!text) return;

            document.getElementById("welcome").style.display = "none";
            currentSession.messages.push({ role: 'u', text: text, deleted: false });
            
            if(currentSession.messages.length === 1) currentSession.title = text.substring(0, 15);
            
            renderChat();
            input.value = "";

            setTimeout(() => {
                let reply = analyzeInput(text);
                currentSession.messages.push({ role: 'v', text: reply, deleted: false });
                renderChat();
                saveToStorage();
            }, 500);
        }

        function renderChat() {
            const box = document.getElementById("chat-box");
            box.innerHTML = "";
            currentSession.messages.forEach((m, index) => {
                const div = document.createElement("div");
                div.className = `msg ${m.role === 'u' ? 'user' : 'viper'}`;
                div.innerHTML = m.text;
                
                if(m.role === 'v' && !m.deleted) {
                    let timer;
                    div.onpointerdown = () => timer = setTimeout(() => openPopup(index), 600);
                    div.onpointerup = () => clearTimeout(timer);
                }
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
            document.getElementById("header-title").innerText = currentSession.title;
        }

        function openPopup(index) {
            selectedMsgIndex = index;
            document.getElementById("popup-menu").style.display = "flex";
        }

        function closePopup() { document.getElementById("popup-menu").style.display = "none"; }

        function actionDelete() {
            currentSession.messages[selectedMsgIndex].text = "⚠ Comando eliminado por seguridad.";
            currentSession.messages[selectedMsgIndex].deleted = true;
            renderChat();
            saveToStorage();
            closePopup();
        }

        function actionFav() {
            let text = currentSession.messages[selectedMsgIndex].text;
            if(!favoritos.includes(text)) favoritos.push(text);
            localStorage.setItem('v_favs', JSON.stringify(favoritos));
            alert("Guardado en favoritos");
        }

        function actionSave() { saveToStorage(); alert("Sincronizado con el búnker."); closePopup(); }

        function saveToStorage() {
            let all = JSON.parse(localStorage.getItem('v_sessions_v4') || "[]");
            let idx = all.findIndex(s => s.id === currentSession.id);
            if(idx > -1) all[idx] = currentSession; else all.unshift(currentSession);
            all.sort((a, b) => (b.pinned - a.pinned));
            if(all.length > 15) all.pop();
            localStorage.setItem('v_sessions_v4', JSON.stringify(all));
            updateList();
        }

        function updateList() {
            const list = document.getElementById("chat-list");
            list.innerHTML = "";
            let all = JSON.parse(localStorage.getItem('v_sessions_v4') || "[]");
            all.forEach(s => {
                let d = document.createElement("div");
                d.className = `chat-item ${s.pinned ? 'pinned' : ''}`;
                d.innerHTML = `<span>${s.title}</span> <button onclick="togglePin(${s.id})" style="background:none; border:none; color:#777; font-size:16px;">${s.pinned ? '📌' : '📍'}</button>`;
                d.onclick = (e) => { if(e.target.tagName !== 'BUTTON') { currentSession = s; renderChat(); toggleMenu(); document.getElementById("welcome").style.display="none"; } };
                list.appendChild(d);
            });
        }

        function togglePin(id) {
            let all = JSON.parse(localStorage.getItem('v_sessions_v4') || "[]");
            let s = all.find(x => x.id === id);
            if(s) s.pinned = !s.pinned;
            localStorage.setItem('v_sessions_v4', JSON.stringify(all));
            updateList();
        }

        function openFavs() {
            const list = document.getElementById("fav-list");
            list.innerHTML = "";
            favoritos.forEach(f => {
                let d = document.createElement("div");
                d.className = "msg viper";
                d.style.marginBottom = "10px";
                d.style.width = "90%";
                d.innerHTML = f;
                list.appendChild(d);
            });
            document.getElementById("fav-screen").style.display = "block";
            toggleMenu();
        }
        function closeFavs() { document.getElementById("fav-screen").style.display = "none"; }
        function historyBack() { if(currentSession.messages.length > 0) { currentSession.messages.pop(); currentSession.messages.pop(); renderChat(); } }
        function toggleMenu() { document.getElementById("sidebar").classList.toggle("open"); document.getElementById("overlay-bg").style.display = document.getElementById("sidebar").classList.contains("open") ? "block" : "none"; }
        function newChat() { currentSession = { id: Date.now(), title: "Nuevo Chat", messages: [], pinned: false }; document.getElementById("welcome").style.display = "block"; renderChat(); toggleMenu(); }

        document.getElementById("user-input").onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        window.onload = () => { updateList(); };
    </script>
</body>
</html>
