<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Cómics ZK</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: monospace; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        #cabecera { width: 100%; padding: 10px; text-align: center; background: rgba(0, 0, 0, 0.8); position: fixed; top: 0; z-index: 10; border-bottom: 2px solid #0f0; }
        #cabecera h2 { margin: 0; font-size: 1.2em; }
        #cabecera p { margin: 5px 0 0; font-size: 0.9em; opacity: 0.8; }
        #contenedor-imagen { margin-top: 70px; margin-bottom: 80px; display: flex; justify-content: center; align-items: center; width: 100%; }
        #imagenPrincipal { max-width: 95%; height: auto; border: 2px solid #0f0; border-radius: 5px; }
        #controles { width: 100%; padding: 15px; background: rgba(0, 0, 0, 0.8); position: fixed; bottom: 0; display: flex; justify-content: center; gap: 20px; z-index: 10; border-top: 2px solid #0f0; }
        .btn-nav { background: #0f0; color: #000; border: none; padding: 12px 24px; font-weight: bold; font-size: 1.1em; border-radius: 5px; cursor: pointer; text-transform: uppercase; font-family: monospace; }
        #imagenPrincipal:after { content: "⚠️ ERROR: Imagen no encontrada o link roto."; display: block; padding: 20px; color: red; background: #111; border: 2px dashed red; text-align: center; }
    </style>
</head>
<body>
    <div id="cabecera">
        <h2>[ Las Pruebas de Hekapoo ]</h2>
        <p id="contador">Cargando...</p>
    </div>
    <div id="contenedor-imagen">
        <img id="imagenPrincipal" src="" alt="Cargando página...">
    </div>
    <div id="controles">
        <button class="btn-nav" onclick="cambiarPagina(-1)">◀ ATRÁS</button>
        <button class="btn-nav" onclick="cambiarPagina(1)">SIG ▶</button>
    </div>
    <script>
        // ==========================================
        // CONFIGURACIÓN: Aquí están tus 13 fotos
        // ==========================================
        var paginas = [
            "1.jpg", "2.jpg", "3.jpg", "4.jpg", "5.jpg", "6.jpg", "7.jpg", "8.jpg", "9.jpg", "10.jpg", "11.jpg", "12.jpg", "13.jpg", "14.jpg", "15.jpg", "16.jpg", "17.webp", "18.webp", "19.webp", "20.webp", "21.webp", "22.webp", "23.webp", "24.webp", "25.webp", "26.webp", "27.webp", "28.webp", "29.webp", "30.webp", "31.webp", "32.webp", "33.webp", "34.webp", "35.webp", "36.webp", "37.webp", "38.webp", "39.webp", "40.webp", "41.webp", "42.webp", "43.webp", "44.webp", "45.webp", "46.webp", "47.webp", "48.webp", "49.webp", "50.webp", "51.webp", "52.webp", "53.webp", "54.webp", "55.webp", "56.webp", "57.webp", "58.webp", "59.webp", "60.webp", "61.webp", "62.webp", "63.webp", "64.webp", "65.webp", "66.webp", "67.webp", "68.webp"
        ];
        var indiceActual = 0;
        var totalPaginas = paginas.length;
        var imgMain = document.getElementById("imagenPrincipal");
        var txtContador = document.getElementById("contador");
        function actualizarVisor() {
            imgMain.src = paginas[indiceActual];
            txtContador.innerText = "Página " + (indiceActual + 1) + " de " + totalPaginas;
            window.scrollTo(0, 0);
        }
        function cambiarPagina(direccion) {
            indiceActual += direccion;
            if (indiceActual < 0) { indiceActual = 0; }
            if (indiceActual >= totalPaginas) { indiceActual = totalPaginas - 1; }
            actualizarVisor();
        }
        if (totalPaginas > 0) { actualizarVisor(); } else { txtContador.innerText = "No hay páginas cargadas."; }
    </script>
</body>
</html>
