    <script>
        function toggleMenu() {
            document.getElementById("menu-lateral").classList.toggle("abierto");
            document.getElementById("overlay").classList.toggle("abierto");
        }

        // --- DICCIONARIO INTELIGENTE ---
        const baseDatos = {
            "hola": [
                "VIPER-CORE en línea. Saludos, Operador.",
                "Hola. ¿Cómo va todo, Operador?",
                "Saludos, Operador."  
            ],
            "nombre": [
                "VIPER.",
                "Mi nombre es EYXM1."
            ],
            "quien eres": [
                "Soy VIPER-CORE, una asistente de IA creada por E2012 y GM-CORE.",
                "Soy una unidad de inteligencia lógica desarrollada por E2012 y GM-CORE."
            ],
            "creador": [
                "Fui diseñada por el equipo de desarrollo: E2012 y GM-CORE.",
                "E2012 y GM-CORE son los desarrolladores que me crearon."
            ],
            "estás bien": [
                "Me siento perfecta.",
                "Todo en orden. De eso no se preocupe."
            ],
            "tabla del 2": ["Aritmética básica: 2x1=2, 2x2=4, 2x3=6, 2x4=8, 2x5=10, 2x6=12, 2x7=14, 2x8=16, 2x9=18, 2x10=20."],
            "tabla del 5": ["Cálculo completado: 5x1=5, 5x2=10, 5x3=15, 5x4=20, 5x5=25, 5x6=30, 5x7=35, 5x8=40, 5x9=45, 5x10=50."],
            "ciencia": [
                "La ciencia es el pilar de mi lógica. ¿Quieres analizar algún fenómeno?",
                "Procesando datos científicos. El conocimiento es poder."
            ],
            "matemáticas": ["El lenguaje universal. Estoy listo para realizar cálculos."],
            "937": [
                "¡Dame unos segundos! Mostrando archivo clasificado: <br><img src='1234.jpg' style='width:100%; border-radius:10px; margin-top:10px; border: 1px solid #0f0;'>"
            ],
            "adiós": ["Cerrando sesión. Cuídate, Operador.", "VIPER fuera. Mantente a salvo."]
        };

        function enviarMensaje() {
            const input = document.getElementById("user-input");
            const chatBox = document.getElementById("chat-box");
            const header = document.getElementById("titulo-header");
            const msjGuia = document.getElementById("msj-guia");
            
            let texto = input.value.trim();
            if (texto === "") return;

            // Quitar mensaje de guía de forma segura
            if (msjGuia) {
                msjGuia.style.display = "none";
            }

            // Actualizar título
            let palabras = texto.split(' ');
            header.innerText = palabras.slice(0, 2).join(' ').toUpperCase() + "...";

            // Mostrar mensaje del usuario
            chatBox.innerHTML += `<div class="user-msg">${texto}</div>`;
            
            let msgMin = texto.toLowerCase();
            let respuestaFinal = "Dato no registrado. VIPER-CORE requiere actualización de E2012.";

            // Buscar respuesta
            for (let clave in baseDatos) {
                if (msgMin.includes(clave)) {
                    let opciones = baseDatos[clave];
                    respuestaFinal = opciones[Math.floor(Math.random() * opciones.length)];
                    break;
                }
            }

            // Respuesta de VIPER con delay
            setTimeout(() => {
                chatBox.innerHTML += `<div class="bot-msg"><b>VIPER:</b> ${respuestaFinal}</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 450);

            input.value = "";
        }

        // Escuchar tecla Enter
        document.getElementById("user-input").addEventListener("keypress", function(e) {
            if (e.key === 'Enter') {
                enviarMensaje();
            }
        });
    </script>
