<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIPER-CORE v4.5 ÉLITE</title>
    <style>
        :root { --bg: #000; --panel: #0a0a0a; --accent: #00ff41; --text: #d1d1d1; --border: #1a1a1a; --user-msg: #161616; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 280px; background: var(--panel); position: fixed; left: -280px; height: 100%; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; border-right: 1px solid var(--border); padding: 20px; box-sizing: border-box; }
        #sidebar.open { left: 0; box-shadow: 10px 0 30px rgba(0,255,65,0.05); }
        .nav-btn { width: 100%; background: transparent; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 4px; margin-bottom: 15px; cursor: pointer; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; transition: 0.3s; }
        .nav-btn:active { background: var(--accent); color: #000; }
        
        .chat-item { padding: 15px; border-radius: 4px; margin-bottom: 8px; background: #0f0f0f; font-size: 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; transition: 0.2s; cursor: pointer; }
        .chat-item.pinned { border-color: var(--accent); background: #051005; }
        .pin-indicator { color: var(--accent); font-size: 10px; font-weight: bold; }

        #main { flex-grow: 1; display: flex; flex-direction: column; width: 100%; height: 100%; position: relative; }
        #header { height: 65px; padding: 0 20px; display: flex; align-items: center; border-bottom: 1px solid var(--border); justify-content: space-between; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); z-index: 10; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 140px; scroll-behavior: smooth; }
        .welcome-msg { text-align: center; margin: auto; color: #444; }
        .welcome-msg h2 { color: #fff; font-weight: 200; font-size: 2.2rem; margin-bottom: 10px; letter-spacing: -1px; }

        .msg { max-width: 80%; padding: 14px 18px; border-radius: 4px; font-size: 15px; line-height: 1.5; position: relative; animation: fadeIn 0.3s ease; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--user-msg); border: 1px solid #222; color: #fff; }
        .viper { align-self: flex-start; background: transparent; border: 1px solid var(--border); color: var(--accent); }

        .loading-icon { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(0,255,65,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        #input-container { position: fixed; bottom: 0; left: 0; width: 100%; padding: 20px 20px 40px 20px; box-sizing: border-box; background: linear-gradient(0deg, #000 70%, transparent); z-index: 1500; }
        #input-area { background: #0c0c0c; border-radius: 4px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid var(--border); gap: 15px; }
        #user-input { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 15px 0; outline: none; font-size: 15px; }
        
        .action-btn { background: none; border: none; color: #555; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .action-btn:hover { color: var(--accent); }

        #popup-menu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .menu-content { background: #0a0a0a; width: 80%; max-width: 300px; border: 1px solid var(--border); padding: 10px; }
        .menu-opt { padding: 15px; text-align: left; cursor: pointer; font-size: 14px; border-bottom: 1px solid #111; text-transform: uppercase; letter-spacing: 1px; }
        .menu-opt:last-child { border: none; color: #666; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div style="font-size: 10px; color: var(--accent); margin-bottom: 30px; letter-spacing: 4px;">SISTEMA OPERATIVO</div>
        <button class="nav-btn" onclick="newChat()">[ + ] NUEVA SESIÓN</button>
        <button class="nav-btn" onclick="alert('Función en desarrollo')">ARCHIVOS</button>
        <div style="margin: 30px 0 10px 0; font-size: 11px; color: #333; letter-spacing: 2px;">HISTORIAL DE LOGS</div>
        <div id="chat-list"></div>
    </div>

    <div id="popup-menu">
        <div class="menu-content" id="menu-box"></div>
    </div>

    <div id="main">
        <div id="header">
            <div onclick="toggleMenu()" style="font-size:20px; cursor:pointer;">⊞</div>
            <div id="header-title" onclick="renameChat()" style="font-weight:bold; letter-spacing:3px; font-size: 14px; cursor:pointer;">VIPER-CORE</div>
            <div id="status-dot" style="width:8px; height:8px; background:var(--accent); border-radius:50%;"></div>
        </div>

        <div id="chat-box">
            <div class="welcome-msg" id="welcome">
                <h2>Hola, Invitado</h2>
                <p style="letter-spacing: 2px; font-size: 11px;">CONEXIÓN ENCRIPTADA ESTABLECIDA</p>
            </div>
        </div>

        <div id="input-container">
            <div id="input-area">
                <button class="action-btn" onclick="historyNav(-1)">↼</button>
                <input type="text" id="user-input" placeholder="Esperando comando..." autocomplete="off">
                <button class="action-btn" onclick="historyNav(1)">⇀</button>
                <button class="action-btn" onclick="sendMessage()" style="color:var(--accent); margin-left:10px;">◈</button>
            </div>
        </div>
    </div>

    <script>
        let currentSession = { id: Date.now(), title: "LOG_SIN_NOMBRE", messages: [], pinned: false };
        let historyIndex = -1;
        let pressTimer;
        let isTyping = false;

        const Responses = {
            "hola": ["Conexión verificada.", "Sistemas en línea.", "Esperando instrucciones, Operador."],
            "default": ["Comando procesado. Analizando variables..."]
        };

        function sendMessage() {
            if(isTyping) return;
            const input = document.getElementById("user-input");
            const val = input.value.trim();
            if(!val) return;

            document.getElementById("welcome").style.display = "none";
            const msgObj = { id: Date.now(), role: 'u', text: val };
            currentSession.messages.push(msgObj);
            
            if(currentSession.messages.length === 1) currentSession.title = val.substring(0, 15).toUpperCase();
            
            renderChat();
            input.value = "";
            historyIndex = currentSession.messages.filter(m => m.role === 'u').length;

            const loadingId = "L-" + Date.now();
            const loadDiv = document.createElement("div");
            loadDiv.className = "msg viper";
            loadDiv.id = loadingId;
            loadDiv.innerHTML = '<div class="loading-icon"></div>';
            document.getElementById("chat-box").appendChild(loadDiv);
            document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;

            isTyping = true;
            setTimeout(() => {
                const reply = Responses[val.toLowerCase()] ? Responses[val.toLowerCase()][0] : Responses.default[0];
                const viperMsg = { id: Date.now(), role: 'v', text: reply };
                currentSession.messages.push(viperMsg);
                
                const loader = document.getElementById(loadingId);
                if(loader) loader.remove();
                
                typeWriter(reply);
                save();
            }, 2000);
        }

        function typeWriter(text) {
            let i = 0;
            const div = document.createElement("div");
            div.className = "msg viper";
            document.getElementById("chat-box").appendChild(div);
            
            function type() {
                if (i < text.length) {
                    div.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 30);
                    document.getElementById("chat-box").scrollTop = document.getElementById("chat-box").scrollHeight;
                } else {
                    isTyping = false;
                }
            }
            type();
        }

        function renderChat() {
            const box = document.getElementById("chat-box");
            box.innerHTML = "";
            if(currentSession.messages.length > 0) document.getElementById("welcome").style.display = "none";
            
            currentSession.messages.forEach((m, idx) => {
                if(!m.text) return;
                const div = document.createElement("div");
                div.className = `msg ${m.role === 'u' ? 'user' : 'viper'}`;
                div.innerHTML = m.text;
                
                div.onmousedown = div.ontouchstart = () => pressTimer = setTimeout(() => openMenu(idx), 800);
                div.onmouseup = div.ontouchend = () => clearTimeout(pressTimer);
                
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
            document.getElementById("header-title").innerText = currentSession.title;
        }

        function openMenu(idx) {
            const menu = document.getElementById("menu-box");
            menu.innerHTML = `
                <div class="menu-opt" onclick="editMsg(${idx})">Editar Comando</div>
                <div class="menu-opt" onclick="deleteMsg(${idx})">Purgar Mensaje</div>
                <div class="menu-opt" onclick="togglePinChat()"> ${currentSession.pinned ? 'Desanclar Sesión' : 'Anclar Sesión'}</div>
                <div class="menu-opt" onclick="closeMenu()">Cancelar</div>
            `;
            document.getElementById("popup-menu").style.display = "flex";
        }

        function editMsg(idx) {
            const newText = prompt("Editar comando:", currentSession.messages[idx].text);
            if(newText) { currentSession.messages[idx].text = newText; renderChat(); save(); }
            closeMenu();
        }

        function deleteMsg(idx) {
            currentSession.messages.splice(idx, 1);
            renderChat();
            save();
            closeMenu();
        }

        function renameChat() {
            const n = prompt("Nuevo ID de Sesión:", currentSession.title);
            if(n) { currentSession.title = n.toUpperCase(); save(); renderChat(); }
        }

        function togglePinChat() {
            currentSession.pinned = !currentSession.pinned;
            save();
            closeMenu();
        }

        function historyNav(dir) {
            const uMsgs = currentSession.messages.filter(m => m.role === 'u');
            historyIndex += dir;
            if(historyIndex < 0) historyIndex = 0;
            if(historyIndex >= uMsgs.length) historyIndex = uMsgs.length;
            const target = uMsgs[historyIndex];
            document.getElementById("user-input").value = target ? target.text : "";
        }

        function save() {
            let logs = JSON.parse(localStorage.getItem('viper_logs') || "[]");
            const i = logs.findIndex(l => l.id === currentSession.id);
            if(i > -1) logs[i] = currentSession; else logs.unshift(currentSession);
            logs.sort((a,b) => b.pinned - a.pinned);
            localStorage.setItem('viper_logs', JSON.stringify(logs));
            updateSidebar();
        }

        function updateSidebar() {
            const list = document.getElementById("chat-list");
            list.innerHTML = "";
            const logs = JSON.parse(localStorage.getItem('viper_logs') || "[]");
            logs.forEach(l => {
                const d = document.createElement("div");
                d.className = `chat-item ${l.pinned ? 'pinned' : ''}`;
                d.innerHTML = `<span>${l.title}</span> ${l.pinned ? '<span class="pin-indicator">BLOQUEADO</span>' : ''}`;
                d.onclick = () => { currentSession = l; renderChat(); toggleMenu(); };
                list.appendChild(d);
            });
        }

        function newChat() {
            currentSession = { id: Date.now(), title: "NUEVO_LOG_" + Date.now().toString().slice(-4), messages: [], pinned: false };
            document.getElementById("welcome").style.display = "block";
            renderChat();
            toggleMenu();
        }

        function toggleMenu() { document.getElementById("sidebar").classList.toggle("open"); }
        function closeMenu() { document.getElementById("popup-menu").style.display = "none"; }
        document.getElementById("user-input").onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        window.onload = updateSidebar;
    </script>
</body>
</html>
