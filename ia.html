<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Base de Pruebas</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        #chat { border: 1px solid #333; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        .u { color: #0f0; margin-bottom: 5px; }
        .i { color: #fff; margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        #in { width: 80%; padding: 10px; background: #111; color: #fff; border: 1px solid #333; }
        button { padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="chat"></div>
    <input type="text" id="in" placeholder="Escribe algo...">
    <button onclick="enviar()">Enviar</button>

    <script>
        const respuestas = {
            "hola": "Hola.",
            "test": "Probando sistema."
        };

        function enviar() {
            const campo = document.getElementById("in");
            const texto = campo.value.trim().toLowerCase();
            const caja = document.getElementById("chat");

            if(!texto) return;

            // Mostrar lo que tú escribes
            caja.innerHTML += `<div class="u">Tú: ${texto}</div>`;

            // Respuesta automática simple
            setTimeout(() => {
                const r = respuestas[texto] || "Recibido.";
                caja.innerHTML += `<div class="i">IA: ${r}</div>`;
                caja.scrollTop = caja.scrollHeight;
            }, 100);

            campo.value = "";
        }
    </script>
</body>
</html>
