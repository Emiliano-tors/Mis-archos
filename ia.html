<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIPER-CORE v4.1</title>
    <style>
        :root { --bg: #000; --panel: #111; --accent: #0f0; --text: #eee; --border: #333; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR CON SISTEMA DE ANCLADO */
        #sidebar { width: 280px; background: var(--panel); position: fixed; left: -280px; height: 100%; transition: 0.3s; z-index: 1000; border-right: 1px solid var(--border); padding: 15px; box-sizing: border-box; }
        #sidebar.open { left: 0; }
        .nav-btn { width: 100%; background: #222; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin-bottom: 15px; cursor: pointer; font-weight: bold; }
        
        .chat-item { padding: 12px; border-radius: 8px; margin-bottom: 5px; background: #1a1a1a; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .chat-item.pinned { border-left: 3px solid var(--accent); background: #1a2a1a; }

        /* INTERFAZ ESTILO GEMINI (COMPACTA) */
        #main { flex-grow: 1; display: flex; flex-direction: column; width: 100%; position: relative; }
        #header { height: 60px; padding: 0 15px; display: flex; align-items: center; border-bottom: 1px solid var(--border); justify-content: space-between; }
        
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 120px; }
        .welcome-msg { text-align: center; margin-top: 40px; color: #888; }
        .welcome-msg h2 { color: #fff; margin-bottom: 5px; }

        .msg { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 15px; line-height: 1.4; position: relative; }
        .user { align-self: flex-end; background: #333; color: #fff; border-bottom-right-radius: 2px; }
        .viper { align-self: flex-start; background: #111; border: 1px solid var(--border); border-bottom-left-radius: 2px; }

        /* BARRA DE RESPUESTA ELEVADA PARA SAMSUNG A03 */
        #input-container { 
            position: absolute; 
            bottom: 0; 
            width: 100%; 
            padding: 10px 10px 25px 10px; /* Aumenté el espacio de abajo (25px) */
            box-sizing: border-box; 
            background: linear-gradient(transparent, #000 30%); 
        }
        #input-area { background: #222; border-radius: 25px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid #444; gap: 10px; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
        #user-input { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 12px 0; outline: none; font-size: 16px; }
        
        .action-btn { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; padding: 5px; opacity: 0.7; }
        .send-btn { color: var(--accent); opacity: 1; font-size: 24px; }

        /* MENÚ EMERGENTE (POPUP) */
        #popup-menu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; }
        .menu-content { background: #1a1a1a; width: 250px; border-radius: 15px; border: 1px solid var(--border); overflow: hidden; }
        .menu-opt { padding: 15px; border-bottom: 1px solid #333; text-align: center; cursor: pointer; transition: 0.2s; }
        .menu-opt:active { background: #333; }

        /* INTERFAZ DE FAVORITOS */
        #fav-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; padding: 20px; box-sizing: border-box; }

        #overlay-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
    </style>
</head>
<body>

    <div id="overlay-bg" onclick="toggleMenu()"></div>
    
    <div id="fav-screen">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>⭐ FAVORITOS</h3>
            <button onclick="closeFavs()" class="nav-btn" style="width:60px; margin:0;">X</button>
        </div>
        <div id="fav-list" style="margin-top:20px;"></div>
    </div>

    <div id="sidebar">
        <button class="nav-btn" onclick="newChat()">+ Nuevo Chat</button>
        <button class="nav-btn" onclick="openFavs()" style="background:#2a2a00; color:#ff0;">⭐ Ver Favoritos</button>
        <div id="chat-list"></div>
    </div>

    <div id="popup-menu">
        <div class="menu-content">
            <div class="menu-opt" onclick="actionFav()" style="color:#ff0">⭐ Favorito</div>
            <div class="menu-opt" onclick="actionDelete()" style="color:#f44">🗑️ Borrar</div>
            <div class="menu-opt" onclick="actionSave()" style="color:#0f0">💾 Guardar Cambios</div>
            <div class="menu-opt" onclick="closePopup()">Cancelar</div>
        </div>
    </div>

    <div id="main">
        <div id="header">
            <span onclick="toggleMenu()" style="font-size:24px;">≡</span>
            <span id="header-title" style="font-weight:bold; letter-spacing:1px;">VIPER</span>
            <div id="status-dot" style="width:10px; height:10px; background:var(--accent); border-radius:50%;"></div>
        </div>

        <div id="chat-box">
            <div class="welcome-msg" id="welcome">
                <h2>Hola, Invitado</h2>
                <p>¿dígame cuál es su pregunta?</p>
            </div>
        </div>

        <div id="input-container">
            <div id="input-area">
                <button class="action-btn" onclick="historyBack()">«</button>
                <input type="text" id="user-input" placeholder="Responder..." autocomplete="off">
                <button class="action-btn send-btn" onclick="sendMessage()">⌁</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN PERSONALIZABLE ---
        const Diccionario = ["hola", "como", "estas", "bien", "mal", "delicioso", "viper", "bunker", "codigo", "ayuda", "sistema"];
        const NuevasPalabras = []; 
        
        const Codigos = { 
            "guayaba": "Delicioso.", 
            "937": "Acceso concedido al bunker.",
            "secret0": "Modo desarrollador activado."
        };

        const RespuestasIA = {
            "hola": ["Hola, operador. VIPER activo.", "Conexión establecida."],
            "estas": ["Procesando datos. Me siento en estado óptimo.", "Todo en orden en el sistema."],
            "default": ["Comando analizado. Buscando en el diccionario central..."]
        };

        let currentSession = { id: Date.now(), title: "Chat", messages: [], pinned: false };
        let selectedMsgIndex = -1;
        let favoritos = JSON.parse(localStorage.getItem('v_favs') || "[]");

        // --- 2. LÓGICA DE PROCESAMIENTO ---
        function analyzeInput(input) {
            let palabras = input.toLowerCase().split(" ");
            for(let p of palabras) { if(Codigos[p]) return Codigos[p]; }
            for(let p of palabras) {
                if(RespuestasIA[p]) {
                    let r = RespuestasIA[p];
                    return r[Math.floor(Math.random() * r.length)];
                }
            }
            return RespuestasIA["default"][0];
        }

        // --- 3. FUNCIONES DE INTERFAZ ---
        function sendMessage() {
            const input = document.getElementById("user-input");
            const text = input.value.trim();
            if(!text) return;

            document.getElementById("welcome").style.display = "none";
            currentSession.messages.push({ role: 'u', text: text, deleted: false });
            
            if(currentSession.messages.length === 1) currentSession.title = text.substring(0, 15);
            
            renderChat();
            input.value = "";

            setTimeout(() => {
                let reply = analyzeInput(text);
                currentSession.messages.push({ role: 'v', text: reply, deleted: false });
                renderChat();
                saveToStorage();
            }, 500);
        }

        function renderChat() {
            const box = document.getElementById("chat-box");
            box.innerHTML = "";
            currentSession.messages.forEach((m, index) => {
                const div = document.createElement("div");
                div.className = `msg ${m.role === 'u' ? 'user' : 'viper'}`;
                div.innerText = m.text;
                
                if(m.role === 'v' && !m.deleted) {
                    let timer;
                    div.onpointerdown = () => timer = setTimeout(() => openPopup(index), 700);
                    div.onpointerup = () => clearTimeout(timer);
                }
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
            document.getElementById("header-title").innerText = currentSession.title;
        }

        function openPopup(index) {
            selectedMsgIndex = index;
            document.getElementById("popup-menu").style.display = "flex";
        }

        function closePopup() { document.getElementById("popup-menu").style.display = "none"; }

        function actionDelete() {
            currentSession.messages[selectedMsgIndex].text = "lo lamento mucho si no fui de ayuda";
            currentSession.messages[selectedMsgIndex].deleted = true;
            renderChat();
            saveToStorage();
            closePopup();
        }

        function actionFav() {
            let text = currentSession.messages[selectedMsgIndex].text;
            if(!favoritos.includes(text)) favoritos.push(text);
            localStorage.setItem('v_favs', JSON.stringify(favoritos));
            alert("Añadido a favoritos");
        }

        function actionSave() {
            saveToStorage();
            alert("Cambios guardados en el bunker.");
            closePopup();
        }

        function saveToStorage() {
            let all = JSON.parse(localStorage.getItem('v_sessions_v4') || "[]");
            let idx = all.findIndex(s => s.id === currentSession.id);
            if(idx > -1) all[idx] = currentSession; else all.unshift(currentSession);
            all.sort((a, b) => (b.pinned - a.pinned));
            if(all.length > 13) all.pop();
            localStorage.setItem('v_sessions_v4', JSON.stringify(all));
            updateList();
        }

        function updateList() {
            const list = document.getElementById("chat-list");
            list.innerHTML = "";
            let all = JSON.parse(localStorage.getItem('v_sessions_v4') || "[]");
            all.forEach(s => {
                let d = document.createElement("div");
                d.className = `chat-item ${s.pinned ? 'pinned' : ''}`;
                d.innerHTML = `<span>${s.title}</span> <button onclick="togglePin(${s.id})" style="background:none; border:none; color:#777;">${s.pinned ? '📌' : '📍'}</button>`;
                d.onclick = (e) => { if(e.target.tagName !== 'BUTTON') { currentSession = s; renderChat(); toggleMenu(); document.getElementById("welcome").style.display="none"; } };
                list.appendChild(d);
            });
        }

        function togglePin(id) {
            let all = JSON.parse(localStorage.getItem('v_sessions_v4') || "[]");
            let s = all.find(x => x.id === id);
            if(s) s.pinned = !s.pinned;
            localStorage.setItem('v_sessions_v4', JSON.stringify(all));
            updateList();
        }

        function openFavs() {
            const list = document.getElementById("fav-list");
            list.innerHTML = "";
            favoritos.forEach(f => {
                let d = document.createElement("div");
                d.className = "msg viper";
                d.style.marginBottom = "10px";
                d.innerText = f;
                list.appendChild(d);
            });
            document.getElementById("fav-screen").style.display = "block";
        }
        function closeFavs() { document.getElementById("fav-screen").style.display = "none"; }
        function historyBack() { if(currentSession.messages.length > 0) { currentSession.messages.pop(); currentSession.messages.pop(); renderChat(); } }
        function toggleMenu() { document.getElementById("sidebar").classList.toggle("open"); document.getElementById("overlay-bg").style.display = document.getElementById("sidebar").classList.contains("open") ? "block" : "none"; }
        function newChat() { currentSession = { id: Date.now(), title: "Nuevo Chat", messages: [], pinned: false }; document.getElementById("welcome").style.display = "block"; renderChat(); toggleMenu(); }

        document.getElementById("user-input").onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        window.onload = () => { updateList(); };
    </script>
</body>
    </html>
