<script>
    function toggleMenu() {
        const menu = document.getElementById("menu-lateral");
        const overlay = document.getElementById("overlay");
        if (menu && overlay) {
            menu.classList.toggle("abierto");
            overlay.classList.toggle("abierto");
        }
    }

    // --- DICCIONARIO INTELIGENTE VIPER-CORE ---
    const baseDatos = {
        "hola": [
            "VIPER-CORE en línea. Saludos, Operador.",
            "Hola. ¿Cómo va todo, Operador?",
            "Sistemas listos. ¿Qué órdenes tienes, Emiliano?"
        ],
        "nombre": [
            "Mi designación es VIPER-CORE.",
            "En los registros aparezco como EYXM1, pero puedes decirme VIPER."
        ],
        "quien eres": [
            "Soy VIPER-CORE, un asistente de IA creado por E2012 y GM-CORE.",
            "Soy una unidad de inteligencia lógica desarrollada por Emi y Gemini."
        ],
        "creador": [
            "Fui diseñada por el equipo: E2012 (Emiliano) y GM-CORE (Gemini).",
            "Mis creadores son E2012 y el núcleo GM-CORE."
        ],
        "estás bien": [
            "Núcleo estable. Temperatura óptima.",
            "Todo en orden. No detecto anomalías en el búnker."
        ],
        "tabla del 2": ["Aritmética: 2x1=2, 2x2=4, 2x3=6, 2x4=8, 2x5=10, 2x6=12, 2x7=14, 2x8=16, 2x9=18, 2x10=20."],
        "tabla del 5": ["Cálculo: 5x1=5, 5x2=10, 5x3=15, 5x4=20, 5x5=25, 5x6=30, 5x7=35, 5x8=40, 5x9=45, 5x10=50."],
        "ciencia": [
            "La ciencia es el pilar de mi lógica. ¿Analizamos datos?",
            "Procesando registros científicos. El conocimiento es poder."
        ],
        "matemáticas": ["El lenguaje universal. Mis procesadores están listos para calcular."],
        "937": [
            "¡Acceso concedido! Mostrando archivo clasificado: <br><img src='1234.jpg' style='width:100%; border-radius:10px; margin-top:10px; border: 2px solid #0f0; shadow: 0 0 10px #0f0;'>"
        ],
        "adiós": ["Sesión terminada. Cuídate, Operador.", "VIPER fuera. Mantente a salvo."]
    };

    function enviarMensaje() {
        const input = document.getElementById("user-input");
        const chatBox = document.getElementById("chat-box");
        const header = document.getElementById("titulo-header");
        
        let texto = input.value.trim();
        if (texto === "") return;

        // Ocultar mensaje guía de forma eficiente
        const msjGuia = document.getElementById("msj-guia");
        if (msjGuia) msjGuia.remove();

        // Actualizar título sin romper el diseño
        header.innerText = "VIPER: " + (texto.length > 10 ? texto.substring(0, 10) + "..." : texto).toUpperCase();

        // Mostrar mensaje del usuario
        chatBox.innerHTML += `<div class="user-msg">${texto}</div>`;
        
        let msgMin = texto.toLowerCase();
        let respuestaFinal = "Dato no registrado. VIPER requiere actualización de E2012.";

        // Buscador de coincidencias
        for (let clave in baseDatos) {
            if (msgMin.includes(clave)) {
                let opciones = baseDatos[clave];
                respuestaFinal = opciones[Math.floor(Math.random() * opciones.length)];
                break;
            }
        }

        // Respuesta con delay para que parezca que piensa
        setTimeout(() => {
            chatBox.innerHTML += `<div class="bot-msg"><b>VIPER:</b> ${respuestaFinal}</div>`;
            // Scroll automático al final
            chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
        }, 400);

        input.value = "";
        input.focus();
    }

    document.getElementById("user-input").addEventListener("keypress", function(e) {
        if (e.key === 'Enter') enviarMensaje();
    });
</script>
