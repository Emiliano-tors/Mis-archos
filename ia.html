<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIPER-CORE v3.0</title>
    <style>
        :root { --bg: #000; --panel: #0a0a0a; --accent: #0f0; --text: #d1d1d1; --border: #1a1a1a; --user-msg: #161616; --danger: #f00; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR (MENÚ IZQUIERDO) */
        #sidebar { width: 280px; background: var(--panel); position: fixed; left: -280px; height: 100%; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; border-right: 1px solid var(--border); padding: 20px; box-sizing: border-box; }
        #sidebar.open { left: 0; }
        .close-x { position: absolute; top: 10px; right: 10px; color: var(--danger); font-weight: bold; cursor: pointer; border: 1px solid var(--danger); padding: 5px 10px; border-radius: 3px; font-size: 12px; }
        .nav-btn { width: 100%; background: transparent; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 4px; margin-bottom: 15px; cursor: pointer; font-size: 13px; font-weight: bold; text-transform: uppercase; }
        
        .chat-item { padding: 15px; border-radius: 4px; margin-bottom: 8px; background: #0f0f0f; font-size: 14px; display: flex; justify-content: space-between; align-items: center; border: 1px solid transparent; transition: 0.2s; cursor: pointer; }
        .chat-item.pinned { border-color: var(--accent); background: #051005; }
        .pin-indicator { color: var(--accent); font-size: 10px; font-weight: bold; }

        /* INTERFAZ PRINCIPAL */
        #main { flex-grow: 1; display: flex; flex-direction: column; width: 100%; height: 100%; position: relative; }
        #header { height: 60px; min-height: 60px; padding: 0 15px; display: flex; align-items: center; border-bottom: 1px solid var(--border); justify-content: space-between; background: #000; z-index: 10; }
        
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; padding-bottom: 150px; scroll-behavior: smooth; }
        .welcome-msg { text-align: center; margin: auto; color: #888; }
        .welcome-msg h2 { color: #fff; font-weight: 200; font-size: 2.2rem; margin-bottom: 10px; }

        .msg { max-width: 85%; padding: 12px; border-radius: 15px; font-size: 15px; line-height: 1.4; position: relative; word-wrap: break-word; }
        .user { align-self: flex-end; background: #333; color: #fff; border-bottom-right-radius: 2px; }
        .viper { align-self: flex-start; background: #111; border: 1px solid var(--border); border-bottom-left-radius: 2px; }
        
        /* BARRA DE RESPUESTA FLOTANTE */
        #input-container { position: fixed; bottom: 0; left: 0; width: 100%; padding: 15px 15px 35px 15px; box-sizing: border-box; background: linear-gradient(transparent, #000 80%); z-index: 1500; }
        #input-area { background: #222; border-radius: 30px; display: flex; align-items: center; padding: 5px 15px; border: 1px solid #444; gap: 10px; box-shadow: 0 -5px 25px rgba(0,0,0,0.8); }
        #user-input { flex-grow: 1; background: transparent; border: none; color: #fff; padding: 12px 0; outline: none; font-size: 16px; }
        
        .action-btn { background: none; border: none; color: #555; font-size: 20px; cursor: pointer; padding: 5px; }
        .action-btn:hover { color: #fff; }

        /* MENU CONTEXTUAL (PULSACIÓN LARGA) */
        #popup-menu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .menu-content { background: #0a0a0a; width: 280px; border-radius: 15px; border: 1px solid var(--border); overflow: hidden; position: relative; }
        .menu-opt { padding: 18px; border-bottom: 1px solid #333; text-align: center; cursor: pointer; font-size: 16px; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="overlay-bg" onclick="toggleMenu()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1999;"></div>
    
    <div id="sidebar">
        <div class="close-x" onclick="toggleMenu()">X</div>
        <button class="nav-btn" onclick="newChat()">+ Nueva Sesión</button>
        <button class="nav-btn" onclick="alert('Acceso a Archivos encriptado')">⭐ Favoritos</button>
        <div id="chat-list"></div>
    </div>

    <div id="popup-menu">
        <div class="menu-content" id="menu-box">
            </div>
    </div>

    <div id="main">
        <div id="header">
            <div onclick="toggleMenu()" style="font-size:30px; cursor:pointer; padding: 5px;">≡</div>
            <div id="header-title" onclick="renameChat()" style="font-weight:bold; letter-spacing:2px; font-size: 14px; cursor:pointer;">VIPER-CORE</div>
            <div id="status-dot" style="width:10px; height:10px; background:var(--accent); border-radius:50%; box-shadow: 0 0 10px var(--accent);"></div>
        </div>

        <div id="chat-box">
            <div class="welcome-msg" id="welcome">
                <h2>Hola, Invitado</h2>
                <p>¿dígame cuál es su pregunta?</p>
            </div>
        </div>

        <div id="input-container">
            <div id="input-area">
                <button class="action-btn" onclick="historyNav(-1)">«</button>
                <input type="text" id="user-input" placeholder="Responder..." autocomplete="off">
                <button class="action-btn" onclick="historyNav(1)">»</button>
                <button class="action-btn" onclick="sendMessage()" style="color:var(--accent); font-size:24px;">◈</button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURACIÓN DEL SISTEMA (RESPUESTAS) ---
        const RespuestasIA = {
            "hola": ["Hola, operador. VIPER activo.", "Conexión establecida, Operador.", "Sistemas listos."],
            "default": ["Comando analizado correctamente. No hay registros exactos para esta consulta."]
        };

        const Codigos = { "guayaba": "Delicioso.", "937": "Acceso total al búnker." };

        let currentSession = { id: Date.now(), title: "LOG", messages: [], pinned: false };
        let historyIndex = -1;
        let pressTimer;

        // --- 2. LÓGICA DE PROCESAMIENTO ---
        function analyzeInput(input) {
            let palabras = input.toLowerCase().split(" ");
            for(let p of palabras) { if(Codigos[p]) return Codigos[p]; }
            
            // Buscar en RespuestasIA
            for(let p of palabras) {
                if(RespuestasIA[p]) {
                    let r = RespuestasIA[p];
                    return r[Math.floor(Math.random() * r.length)];
                }
            }
            return RespuestasIA["default"][0];
        }

        // --- 3. FUNCIONES DE INTERFAZ ---
        function sendMessage() {
            const input = document.getElementById("user-input");
            const text = input.value.trim();
            if(!text) return;

            document.getElementById("welcome").style.display = "none";
            const userMsg = { id: Date.now(), role: 'u', text: text, deleted: false };
            currentSession.messages.push(userMsg);
            
            if(currentSession.messages.length === 1) currentSession.title = text.substring(0, 15).toUpperCase();
            
            renderChat();
            input.value = "";
            historyIndex = currentSession.messages.filter(m => m.role === 'u').length;

            // Respuesta Instantánea (No se traba)
            setTimeout(() => {
                let replyText = analyzeInput(text);
                currentSession.messages.push({ id: Date.now() + 1, role: 'v', text: replyText, deleted: false });
                renderChat();
                saveToStorage();
            }, 300);
        }

        function renderChat() {
            const box = document.getElementById("chat-box");
            box.innerHTML = "";
            currentSession.messages.forEach((m, idx) => {
                if(!m.text) return;
                const div = document.createElement("div");
                div.className = `msg ${m.role === 'u' ? 'user' : 'viper'}`;
                div.innerHTML = m.text;
                
                // Eventos de pulsación larga (Menú)
                div.onmousedown = div.ontouchstart = () => pressTimer = setTimeout(() => openMenu(idx), 800);
                div.onmouseup = div.ontouchend = () => clearTimeout(pressTimer);
                
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
            document.getElementById("header-title").innerText = currentSession.title;
        }

        // --- 4. ACCIONES DEL MENÚ EMERGENTE ---
        function openMenu(idx) {
            const menu = document.getElementById("menu-box");
            menu.innerHTML = `
                <div class="close-x" style="position:absolute; top:10px; right:10px;" onclick="closeMenu()">X</div>
                <div class="menu-opt" onclick="editMsg(${idx})">Editar Mensaje</div>
                <div class="menu-opt" onclick="deleteMsg(${idx})" style="color:var(--danger)">Purgar Mensaje</div>
                <div class="menu-opt" onclick="togglePinChat()"> ${currentSession.pinned ? 'Desanclar Log' : 'Anclar Log'}</div>
            `;
            document.getElementById("popup-menu").style.display = "flex";
        }

        function closeMenu() { document.getElementById("popup-menu").style.display = "none"; }

        function editMsg(idx) {
            const newText = prompt("Editar comando:", currentSession.messages[idx].text);
            if(newText) { currentSession.messages[idx].text = newText; renderChat(); saveToStorage(); }
            closeMenu();
        }

        function deleteMsg(idx) {
            currentSession.messages.splice(idx, 1);
            renderChat(); saveToStorage(); closeMenu();
        }

        function renameChat() {
            const n = prompt("Nuevo ID:", currentSession.title);
            if(n) { currentSession.title = n.toUpperCase(); saveToStorage(); renderChat(); }
        }

        function togglePinChat() {
            currentSession.pinned = !currentSession.pinned;
            saveToStorage(); updateSidebar(); closeMenu();
        }

        // --- 5. GESTIÓN DE CHATS Y HISTORIAL ---
        function historyNav(dir) {
            const uMsgs = currentSession.messages.filter(m => m.role === 'u');
            historyIndex += dir;
            if(historyIndex < 0) historyIndex = 0;
            if(historyIndex >= uMsgs.length) historyIndex = uMsgs.length;
            const target = uMsgs[historyIndex];
            document.getElementById("user-input").value = target ? target.text : "";
        }

        function saveToStorage() {
            let logs = JSON.parse(localStorage.getItem('viper_logs_v3') || "[]");
            const i = logs.findIndex(l => l.id === currentSession.id);
            if(i > -1) logs[i] = currentSession; else logs.unshift(currentSession);
            logs.sort((a,b) => (b.pinned - a.pinned) || (b.id - a.id));
            localStorage.setItem('viper_logs_v3', JSON.stringify(logs));
            updateSidebar();
        }

        function updateSidebar() {
            const list = document.getElementById("chat-list");
            list.innerHTML = "";
            const logs = JSON.parse(localStorage.getItem('viper_logs_v3') || "[]");
            logs.forEach(l => {
                const d = document.createElement("div");
                d.className = `chat-item ${l.pinned ? 'pinned' : ''}`;
                d.innerHTML = `<span>${l.title}</span> <button onclick="togglePinChat(${l.id})" style="background:none; border:none; color:#555;">${l.pinned ? '📌' : '📍'}</button>`;
                d.onclick = (e) => { if(e.target.tagName !== 'BUTTON') { currentSession = l; renderChat(); toggleMenu(); document.getElementById("welcome").style.display="none"; } };
                list.appendChild(d);
            });
        }

        function newChat() {
            currentSession = { id: Date.now(), title: "NUEVO_LOG", messages: [], pinned: false };
            document.getElementById("welcome").style.display = "block";
            renderChat(); toggleMenu();
        }

        function toggleMenu() { document.getElementById("sidebar").classList.toggle("open"); document.getElementById("overlay-bg").style.display = document.getElementById("sidebar").classList.contains("open") ? "block" : "none"; }
        document.getElementById("user-input").onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };
        window.onload = updateSidebar;
    </script>
</body>
</html>
