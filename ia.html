<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIPER-CORE OMNI v6.0</title>
    <style>
        :root { --bg: #000; --accent: #0f0; --panel: #0d0d0d; --msg-user: #1a1a1a; --border: #222; }
        body { background: var(--bg); color: #eee; font-family: 'Courier New', monospace; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* INTERFAZ OMNI (SIDEBAR + X) */
        #sidebar { width: 280px; background: var(--panel); position: fixed; left: -280px; height: 100%; transition: 0.3s; z-index: 2000; border-right: 1px solid var(--border); padding: 15px; box-sizing: border-box; }
        #sidebar.open { left: 0; }
        .btn-x { color: #f00; border: 1px solid #f00; padding: 5px 10px; float: right; cursor: pointer; font-weight: bold; }
        .nav-btn { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid var(--border); color: #fff; cursor: pointer; text-align: left; }
        
        /* CHAT BOX ESTILO VIPER */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 120px; }
        .msg { max-width: 85%; padding: 12px 18px; border-radius: 12px; line-height: 1.5; font-size: 15px; position: relative; animation: slide 0.2s ease-out; }
        .user { align-self: flex-end; background: var(--msg-user); border: 1px solid #333; color: #fff; }
        .viper { align-self: flex-start; background: #000; border-left: 3px solid var(--accent); color: var(--accent); box-shadow: inset 0 0 10px #050505; }
        
        /* INPUT DINÁMICO (TIPO GROK/GEMINI) */
        #input-container { position: fixed; bottom: 0; width: 100%; padding: 15px; background: linear-gradient(transparent, #000 40%); box-sizing: border-box; }
        #input-area { background: #111; border: 1px solid var(--border); border-radius: 25px; display: flex; align-items: center; padding: 5px 20px; gap: 10px; }
        #user-input { flex: 1; background: transparent; border: none; color: #fff; padding: 12px 0; outline: none; font-size: 16px; }
        .ctrl-btn { color: #555; background: none; border: none; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .ctrl-btn:hover { color: var(--accent); }

        /* MENÚ CONTEXTUAL */
        #ctx-menu { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; }
        .menu-box { background: #0a0a0a; border: 1px solid var(--border); width: 80%; max-width: 300px; border-radius: 10px; overflow: hidden; }
        .opt { padding: 15px; border-bottom: 1px solid #111; text-align: center; cursor: pointer; }
        .opt:last-child { border: none; }

        @keyframes slide { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="btn-x" onclick="closeSide()">X</div>
        <h3 style="color:var(--accent); letter-spacing: 2px;">BÚNKER VIPER</h3>
        <button class="nav-btn" onclick="newSession()">+ NUEVA SESIÓN</button>
        <button class="nav-btn" onclick="toggleMem()">MEMORIA: <span id="mem-val">ON</span></button>
        <div id="log-list" style="margin-top: 20px;"></div>
    </div>

    <div id="ctx-menu">
        <div class="menu-box" id="menu-inner"></div>
    </div>

    <header style="height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid var(--border);">
        <div onclick="openSide()" style="font-size: 25px; cursor: pointer;">☰</div>
        <div id="session-title" onclick="editTitle()" style="font-weight: bold; font-size: 14px;">VIPER-CORE OMNI</div>
        <div style="width: 10px; height: 10px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent);"></div>
    </header>

    <div id="chat-box">
        <div id="welcome" style="margin: auto; text-align: center; opacity: 0.5;">
            <h1>VIPER</h1>
            <p>SISTEMA OPERACIONAL LISTO</p>
        </div>
    </div>

    <div id="input-container">
        <div id="input-area">
            <button class="ctrl-btn" onclick="hist(-1)">«</button>
            <input type="text" id="user-input" placeholder="Escribir comando..." autocomplete="off">
            <button class="ctrl-btn" onclick="hist(1)">»</button>
            <button class="ctrl-btn" onclick="send()" style="color:var(--accent)">◈</button>
        </div>
    </div>

    <script>
        // --- PROPIEDADES EYU488 (VIPER) ---
        let currentLog = { id: Date.now(), title: "NUEVO_LOG", msgs: [], pinned: false };
        let hIdx = -1;
        let mem = true;
        let timer;

        // --- SISTEMA DE RESPUESTAS (VIPER BRAIN) ---
        const VIPER_BRAIN = {
            "hola": "Conexión establecida. VIPER-CORE operativo.",
            "quien eres": "EYU488. Asistente digital de 21 años. Control total del búnker.",
            "borrar": "Protocolo de purga activado por orden del Operador.",
            "default": "Comando procesado. No hay registros exactos, pero ejecuto lógica de soporte."
        };

        function send() {
            const input = document.getElementById("user-input");
            const val = input.value.trim();
            if(!val) return;

            document.getElementById("welcome").style.display = "none";
            
            // 1. Guardar mensaje de usuario
            currentLog.msgs.push({ r: 'u', t: val });
            if(currentLog.msgs.length === 1) currentLog.title = val.substring(0, 12).toUpperCase();
            
            draw();
            input.value = "";

            // 2. Respuesta instantánea sin bloqueos
            setTimeout(() => {
                let r = VIPER_BRAIN[val.toLowerCase()] || VIPER_BRAIN["default"];
                currentLog.msgs.push({ r: 'v', t: r });
                draw();
                save();
            }, 200);
        }

        function draw() {
            const box = document.getElementById("chat-box");
            box.innerHTML = "";
            currentLog.msgs.forEach((m, i) => {
                const d = document.createElement("div");
                d.className = `msg ${m.r === 'u' ? 'user' : 'viper'}`;
                d.innerHTML = m.t;
                
                // Pulsación larga para Menú Contextual
                d.onmousedown = d.ontouchstart = () => timer = setTimeout(() => openCtx(i), 700);
                d.onmouseup = d.ontouchend = () => clearTimeout(timer);
                
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
            document.getElementById("session-title").innerText = currentLog.title;
        }

        function openCtx(i) {
            const m = document.getElementById("menu-inner");
            m.innerHTML = `
                <div class="btn-x" style="margin:10px;" onclick="closeCtx()">X</div>
                <div class="opt" onclick="editMsg(${i})">EDITAR COMANDO</div>
                <div class="opt" onclick="delMsg(${i})" style="color:red">PURGAR REGISTRO</div>
                <div class="opt" onclick="pinLog()">ANCLAR SESIÓN</div>
            `;
            document.getElementById("ctx-menu").style.display = "flex";
        }

        function editMsg(i) {
            const nt = prompt("Corregir:", currentLog.msgs[i].t);
            if(nt) { currentLog.msgs[i].t = nt; draw(); save(); }
            closeCtx();
        }

        function delMsg(i) {
            currentLog.msgs.splice(i, 1);
            draw(); save(); closeCtx();
        }

        function save() {
            let logs = JSON.parse(localStorage.getItem('v_omni_6') || "[]");
            const idx = logs.findIndex(l => l.id === currentLog.id);
            if(idx > -1) logs[idx] = currentLog; else logs.unshift(currentLog);
            logs.sort((a,b) => b.pinned - a.pinned);
            localStorage.setItem('v_omni_6', JSON.stringify(logs));
            updateList();
        }

        function updateList() {
            const list = document.getElementById("log-list");
            list.innerHTML = "";
            const logs = JSON.parse(localStorage.getItem('v_omni_6') || "[]");
            logs.forEach(l => {
                const d = document.createElement("div");
                d.className = "nav-btn";
                d.style.borderColor = l.pinned ? "var(--accent)" : "#222";
                d.innerHTML = `${l.pinned ? '📌 ' : ''}${l.title}`;
                d.onclick = () => { currentLog = l; draw(); closeSide(); };
                list.appendChild(d);
            });
        }

        function hist(d) {
            const us = currentLog.msgs.filter(m => m.r === 'u');
            hIdx += d;
            if(hIdx < 0) hIdx = 0;
            if(hIdx >= us.length) hIdx = us.length;
            document.getElementById("user-input").value = us[hIdx] ? us[hIdx].t : "";
        }

        function openSide() { document.getElementById("sidebar").classList.add("open"); }
        function closeSide() { document.getElementById("sidebar").classList.remove("open"); }
        function closeCtx() { document.getElementById("ctx-menu").style.display = "none"; }
        function newSession() { currentLog = { id: Date.now(), title: "NUEVO_LOG", msgs: [], pinned: false }; document.getElementById("welcome").style.display = "block"; draw(); closeSide(); }
        function editTitle() { const t = prompt("ID de sesión:"); if(t) { currentLog.title = t.toUpperCase(); save(); draw(); } }
        function toggleMem() { mem = !mem; document.getElementById("mem-val").innerText = mem ? "ON" : "OFF"; }
        function pinLog() { currentLog.pinned = !currentLog.pinned; save(); closeCtx(); }

        document.getElementById("user-input").onkeypress = (e) => { if(e.key === 'Enter') send(); };
        window.onload = updateList;
    </script>
</body>
</html>
