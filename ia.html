<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de Pruebas v1.2</title>
    <style>
        /* Estilos básicos para que se vea mejor en tu celular */
        body { 
            background: #000; 
            color: #fff; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        
        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
        }

        .mensaje { 
            padding: 10px 15px; 
            border-radius: 10px; 
            max-width: 80%; 
            font-size: 16px; 
        }

        .u { 
            align-self: flex-end; 
            background: #222; 
            color: #0f0; 
        }

        .i { 
            align-self: flex-start; 
            background: #111; 
            border: 1px solid #333; 
            color: #fff; 
        }

        #input-area { 
            padding: 15px; 
            background: #0a0a0a; 
            display: flex; 
            gap: 10px; 
            border-top: 1px solid #222; 
        }

        #in { 
            flex: 1; 
            padding: 12px; 
            background: #1a1a1a; 
            border: 1px solid #333; 
            color: #fff; 
            border-radius: 5px; 
            outline: none; 
        }

        button { 
            padding: 10px 20px; 
            background: #0f0; 
            color: #000; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <div id="chat">
        </div>

    <div id="input-area">
        <input type="text" id="in" placeholder="Escribir...">
        <button onclick="enviar()">Enviar</button>
    </div>

    <script>
        // Mantenemos la lógica simple que ya te funcionó
        const respuestas = {
            "hola": "Hola.",
            "test": "Sistema operativo."
        };

        function enviar() {
            const campo = document.getElementById("in");
            const texto = campo.value.trim().toLowerCase();
            const caja = document.getElementById("chat");

            if(!texto) return;

            // Mensaje del usuario
            caja.innerHTML += `<div class="mensaje u">${texto}</div>`;

            // Respuesta de la IA
            setTimeout(() => {
                const r = respuestas[texto] || "Recibido.";
                caja.innerHTML += `<div class="mensaje i">${r}</div>`;
                caja.scrollTop = caja.scrollHeight;
            }, 150);

            campo.value = "";
            campo.focus();
        }

        // Para que puedas enviar con el "Enter" del teclado
        document.getElementById("in").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                enviar();
            }
        });
    </script>
</body>
</html>
